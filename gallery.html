<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Gallery - Santosh Classes</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --accent: #ff6f00;
            --gold: #ffd700;
            --light: #f8f9fa;
            --dark: #121212;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.18);
            --radius: 16px;
            --radius-lg: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 1280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            line-height: 1.7;
            color: #333;
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: var(--primary);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        .navbar .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #ff6f00, #ff8f00);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(255, 111, 0, 0.3);
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            color: var(--gold);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all var(--transition);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .back-btn:hover {
            background: white;
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: white;
            padding: 60px 24px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .page-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.03)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,138.7C672,128,768,160,864,181.3C960,203,1056,213,1152,197.3C1248,181,1344,139,1392,117.3L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            pointer-events: none;
        }
        .page-header .container {
            max-width: var(--max-width);
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .page-header .section-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .page-header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .page-header h1 span {
            color: var(--gold);
        }
        .page-header p {
            opacity: 0.85;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Gallery Grid */
        .gallery-section {
            padding: 40px 0 80px;
            margin-top: -40px;
            position: relative;
            z-index: 10;
        }
        .gallery-section .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            aspect-ratio: 4/3;
            background: #e0e0e0;
            cursor: pointer;
            position: relative;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-6px);
        }
        .gallery-item:hover img {
            transform: scale(1.08);
        }
        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(26, 35, 126, 0);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .gallery-item:hover::after {
            background: rgba(26, 35, 126, 0.2);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .lightbox.active img {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: white;
            color: #333;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .lightbox-close:hover {
            background: #d32f2f;
            color: white;
            transform: scale(1.1);
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        .lightbox-prev {
            left: 24px;
        }
        .lightbox-next {
            right: 24px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .empty-state h3 {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 8px;
        }

        /* Footer */
        .gallery-footer {
            text-align: center;
            padding: 30px 24px;
            background: var(--dark);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }
        .gallery-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        .gallery-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }
            .page-header {
                padding: 40px 24px 60px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 14px;
            }
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="logo-text">Santosh <span>Classes</span></div>
            </a>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <div class="container">
            <div class="section-tag">📸 Photo Gallery</div>
            <h1>Our <span>Campus</span> in Pictures</h1>
            <p>A glimpse into our classrooms, events, student activities, and the vibrant learning environment at Santosh Classes.</p>
        </div>
    </header>

    <!-- Gallery Grid -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid" id="galleryGrid">
                <!-- Images will be loaded here dynamically -->
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev"><i class="fas fa-chevron-left"></i></button>
        <img src="" alt="Gallery Image" id="lightboxImg">
        <button class="lightbox-nav lightbox-next" id="lightboxNext"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Footer -->
    <footer class="gallery-footer">
        <p>&copy; 2024 <a href="index.html">Santosh Classes</a>. All Rights Reserved. | Follow us on social media for more updates!</p>
    </footer>

    <script>
        // ========== DEFAULT GALLERY IMAGES ==========
        const defaultGalleryImages = [
            'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1577896851231-70ef18881754?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1509062522246-3755977927d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1607237138185-eedd9c632b0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1523050854058-8df9010fbdbf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1546410531-bb4caa6b424d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'
        ];

        // ========== LOAD IMAGES ==========
        function getGalleryImages() {
            const stored = localStorage.getItem('santoshSiteData');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.gallery && data.gallery.length > 0) {
                    return data.gallery;
                }
            }
            return defaultGalleryImages;
        }

        function renderGallery() {
            const images = getGalleryImages();
            const grid = document.getElementById('galleryGrid');

            if (images.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="fas fa-images"></i>
                        <h3>No Images Yet</h3>
                        <p>Check back soon for photos of our campus and activities.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = images.map((url, index) => `
                <div class="gallery-item" onclick="openLightbox(${index})">
                    <img src="${url}" alt="Gallery Image ${index + 1}" loading="lazy" onerror="this.src='https://via.placeholder.com/800x600?text=Image+Not+Found'">
                </div>`).join('');
        }

        // ========== LIGHTBOX ==========
        let currentImageIndex = 0;
        let galleryImages = [];

        function openLightbox(index) {
            galleryImages = getGalleryImages();
            currentImageIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightboxImage() {
            document.getElementById('lightboxImg').src = galleryImages[currentImageIndex];
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
            updateLightboxImage();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
            updateLightboxImage();
        }

        // Lightbox event listeners
        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('lightboxNext').addEventListener('click', nextImage);
        document.getElementById('lightboxPrev').addEventListener('click', prevImage);

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // ========== INITIALIZE ==========
        window.addEventListener('DOMContentLoaded', () => {
            renderGallery();
        });

        console.log('📸 Gallery page loaded successfully!');
    </script>
</body>
</html>
